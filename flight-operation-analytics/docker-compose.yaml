x-superset-user: &superset-user root
x-superset-volumes: &superset-volumes
  # /app/pythonpath_docker will be appended to the PYTHONPATH in the final container
  - ./docker:/app/docker
  # - ./superset:/app/superset
  - ./docker/superset_config.py:/app/pythonpath/superset_config.py

services:
  db:
    container_name: flight_postgres_container
    image: postgres:14.17
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/airflow_init_db.sql:/docker-entrypoint-initdb.d/airflow_init_db.sql
      - ./postgres/superset_init.sql:/docker-entrypoint-initdb.d/superset_init.sql
    networks:
      - flight-network
  airflow:
    container_name: flight_airflow
    image: "apache/airflow:3.1.7"
    ports:
    - 8100:8080
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${AIRFLOW_DB}
    volumes: 
      - ./airflow/dags/:/opt/airflow/dags
      - ./api-request/:/opt/airflow/api-request
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - '137'
    depends_on:
      - db
    networks:
      - flight-network
    command: > 
      bash -c "airflow db migrate && airflow standalone"

  dbt:
    container_name: dbt_container
    image: ghcr.io/dbt-labs/dbt-postgres:1.9.latest
    volumes:
      - ./dbt/flight_project:/usr/app
      - ./dbt/:/root/.dbt
    working_dir: /usr/app
    environment:
      - DBT_PROFILES_DIR=/root/.dbt
    depends_on:
      - db
    command: run
    networks:
      - flight-network

  superset-init:
    image: apache/superset:3.0.0-py310
    container_name: superset-init
    command: ["/app/docker/docker-init.sh"]
    env_file:
      - path: docker/.env # default
        required: true
    environment:
      - SUPERSET_LOAD_EXAMPLES=no
      - SUPERSET_LOG_LEVEL=info
      - DATABASE_DB=superset_db
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    user: *superset-user
    volumes: *superset-volumes
    networks:
      - flight-network
    healthcheck:
      disable: true
  superset:
    env_file:
      - path: docker/.env # default
        required: true
    image: apache/superset:3.0.0-py310
    container_name: superset_app
    command: ["/app/docker/docker-bootstrap.sh", "app"]
    restart: unless-stopped
    environment:
      - SUPERSET_LOG_LEVEL=info
      - DATABASE_DB=superset_db
    ports:
      - "8088:8088"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    user: *superset-user
    depends_on:
      superset-init:
        condition: service_completed_successfully
    volumes: *superset-volumes
    networks:
      - flight-network
  redis:
    image: redis:7
    container_name: superset_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes: 
      - redis:/data
    networks:
      - flight-network
networks:
  flight-network:
    driver: bridge


volumes:
  redis:
    external: false




